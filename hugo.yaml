  homeInfoParams:
    Title: "Home Office Gear Hub 🖥️"
    Content: "We review and compare the best home office equipment. Standing desks, ergonomic chairs, monitor arms — everything you need for a comfortable, productive workspace."

  socialIcons: []

outputs:
  home: ["HTML", "RSS", "JSON"]
